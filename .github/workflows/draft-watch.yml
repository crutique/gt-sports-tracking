name: draft-watch
on:
  schedule: [{cron: "0 */6 * * *"}]
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: pip install -r requirements.txt
      - run: python -m pytest -q
      - run: npm install -g @anthropic-ai/claude-code
      - run: python -m pipeline.draft_watch
        env:
          ANTHROPIC_API_KEY: "${{ secrets.ANTHROPIC_API_KEY }}"
          CLAUDE_CODE_OAUTH_TOKEN: "${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}"
      - run: |
          git config user.name "gt-summer-tracker-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pipeline/draft.yaml site/src/data/draft.json site/src/data/meta.json data/
          git diff --cached --quiet || (git commit -m "data: draft-watch $(date -u +%F-%H%M)" && git push)
